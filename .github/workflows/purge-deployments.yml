# Manually purge accumulated Cloudflare Pages *preview* deployments.
#
# Cloudflare won't let you delete a Pages project (or reliably manage it) once it
# has a high number (>100) of deployments — see
# https://developers.cloudflare.com/pages/platform/known-issues/#delete-a-project-with-a-high-amount-of-deployments
# Every push to a branch other than `main` creates a preview deployment, so they
# pile up. This talks to the Cloudflare REST API directly (curl + jq, both on the
# runner) using the same repo secrets the deploy workflow already uses — nothing
# to install or authenticate locally.
#
# Manual only (workflow_dispatch). It deletes ONLY preview deployments and never
# touches production. Run it with "Dry run" checked first to see the counts.
name: Purge Cloudflare Pages deployments

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — count what would be deleted, delete nothing"
        type: boolean
        default: true

# Never let two purges race over the same deployment set.
concurrency:
  group: purge-deployments
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT: clear-horizons # the post-Tier-2 project; the old star-horizon-planner project gets deleted whole once retired
    steps:
      - name: Purge preview deployments via Cloudflare API
        run: |
          set +e; set -uo pipefail          # handle HTTP errors ourselves, don't abort mid-loop
          API="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT/deployments"
          auth=(-H "Authorization: Bearer $CF_API_TOKEN")

          # Fail fast if the token / account / project don't resolve.
          probe=$(curl -s "${auth[@]}" "$API?per_page=1")
          if [ "$(echo "$probe" | jq -r '.success')" != "true" ]; then
            echo "Cloudflare API error — check the CLOUDFLARE_* secrets and project name:"
            echo "$probe" | jq -r '.errors // .messages // .' 2>/dev/null || echo "$probe"
            exit 1
          fi

          # Tally every deployment across all pages (report + dry-run basis).
          total=0; previews=0; prod=0; page=1
          while :; do
            batch=$(curl -s "${auth[@]}" "$API?per_page=25&page=$page" | jq -c '.result // []')
            n=$(echo "$batch" | jq 'length')
            [ "$n" -eq 0 ] && break
            total=$((total + n))
            previews=$((previews + $(echo "$batch" | jq '[.[] | select(.environment=="preview")] | length')))
            prod=$((prod + $(echo "$batch" | jq '[.[] | select(.environment=="production")] | length')))
            page=$((page + 1))
          done
          echo "Project '$PROJECT' — total deployments: $total  (preview: $previews, production: $prod)"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo
            echo "=== Diagnostic: all Pages projects in this account and their deployment counts ==="
            PROJ_API="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects"
            names=$(curl -s "${auth[@]}" "$PROJ_API?per_page=25" | jq -r '.result[]?.name')
            if [ -z "$names" ]; then
              echo "(no Pages projects visible to this token/account)"
              echo "Raw projects response (first 400 chars):"
              curl -s "${auth[@]}" "$PROJ_API?per_page=25" | head -c 400; echo
            fi
            for pj in $names; do
              c=0; p=1
              while :; do
                m=$(curl -s "${auth[@]}" "$PROJ_API/$pj/deployments?per_page=25&page=$p" | jq '.result // [] | length')
                [ "$m" -eq 0 ] && break
                c=$((c + m)); p=$((p + 1))
              done
              echo "  $pj: $c deployments"
            done
            echo
            echo "Dry run — would delete the $previews preview deployment(s) in '$PROJECT'; the $prod production deployment(s) are kept."
            exit 0
          fi

          # Delete only previews. Re-fetch page 1 each pass since deletes shrink
          # the set; production deployments are never selected, so this converges.
          echo "Deleting $previews preview deployment(s)..."
          deleted=0
          while :; do
            ids=$(curl -s "${auth[@]}" "$API?per_page=25&page=1" | jq -r '.result[]? | select(.environment=="preview") | .id')
            [ -z "$ids" ] && break
            progress=0
            for id in $ids; do
              if curl -s -X DELETE "${auth[@]}" "$API/$id?force=true" | jq -e '.success' >/dev/null; then
                deleted=$((deleted + 1)); progress=$((progress + 1))
              else
                echo "  warn: could not delete $id"
              fi
            done
            # Nothing in this pass could be deleted — stop rather than spin forever.
            [ "$progress" -eq 0 ] && { echo "No further deletions possible; stopping."; break; }
          done
          echo "Done. Deleted $deleted preview deployment(s); production kept."
