# Manually purge accumulated Cloudflare Pages *preview* deployments.
#
# Cloudflare won't let you delete a Pages project (or reliably manage it) once it
# has a high number (>100) of deployments — see
# https://developers.cloudflare.com/pages/platform/known-issues/#delete-a-project-with-a-high-amount-of-deployments
# Every push to a branch other than `main` creates a preview deployment, so they
# pile up. This runs Cloudflare's recommended `wrangler pages deployment delete`
# loop on a GitHub runner (Node preinstalled) using the same repo secrets the
# deploy workflow already uses — so there's nothing to install or authenticate
# locally.
#
# Manual only (workflow_dispatch). It KEEPS the active production deployment and
# deletes everything else. Run it with "Dry run" checked first to see the list.
name: Purge Cloudflare Pages deployments

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — list what would be deleted, delete nothing"
        type: boolean
        default: true

# Never let two purges (or a purge and itself) race over the same deployment set.
concurrency:
  group: purge-deployments
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT: star-horizon-planner
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: List deployments (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          echo "Deployments for $PROJECT — the active production one is always kept:"
          wrangler pages deployment list --project-name "$PROJECT" --json \
            | jq -r '.[] | "\(.Environment)\t\(.Id)"' | sort || true
          echo
          echo "Uncheck \"Dry run\" and re-run to delete everything except the active production deployment."

      - name: Delete deployments (keep active production)
        if: ${{ !inputs.dry_run }}
        run: |
          # Cloudflare refuses to delete the ACTIVE production deployment, which
          # would make a naive "list, delete all, repeat" loop spin forever. So
          # we learn that one deployment's id from the failed delete and exclude
          # it on the next pass — Cloudflare's own documented workaround.
          prod_id=""
          while :; do
            ids=$(wrangler pages deployment list --project-name "$PROJECT" --json | jq -r '.[].Id')
            to_delete=$(echo "$ids" | grep -v -F -x "$prod_id" | grep . || true)
            [ -z "$to_delete" ] && { echo "Done. Kept active production deployment: ${prod_id:-none}"; break; }
            echo "Deleting $(echo "$to_delete" | wc -l | tr -d ' ') deployment(s)..."
            while IFS= read -r id; do
              if ! wrangler pages deployment delete "$id" --project-name "$PROJECT" --force 2>&1 \
                  | tee /tmp/wrangler-del.log | grep -q "Successfully deleted"; then
                grep -q "active production deployment" /tmp/wrangler-del.log && prod_id="$id"
              fi
            done <<< "$to_delete"
          done
