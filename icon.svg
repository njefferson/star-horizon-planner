<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Vector rendition of the brand art (art/icon-master.png, 2026-07-19): a
       long-exposure star trail wheeling around Polaris over a conifer treeline.
       Favicon + manifest SVG icon; the shipped PNGs derive from the raster
       master (scripts/gen-assets.mjs). Full-bleed square — the OS masks its own
       corners; meaning (Polaris + trails) stays clear of the edges. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1534"/>
      <stop offset="0.55" stop-color="#1a1b46"/>
      <stop offset="0.82" stop-color="#38305a"/>
      <stop offset="1" stop-color="#4a3a5c"/>
    </linearGradient>
    <clipPath id="frame"><rect width="512" height="512"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="512" height="512" fill="url(#sky)"/>
    <!-- concentric star trails around Polaris (upper right); lower arcs are
         covered by the treeline below, so they "set" behind the horizon -->
    <g fill="none" stroke="#cdd8f2" stroke-width="1.4">
      <circle cx="338" cy="150" r="34" opacity="0.55"/>
      <circle cx="338" cy="150" r="62" opacity="0.4"/>
      <circle cx="338" cy="150" r="94" opacity="0.5"/>
      <circle cx="338" cy="150" r="130" opacity="0.32"/>
      <circle cx="338" cy="150" r="170" opacity="0.42"/>
      <circle cx="338" cy="150" r="214" opacity="0.3"/>
      <circle cx="338" cy="150" r="262" opacity="0.36"/>
      <circle cx="338" cy="150" r="314" opacity="0.26"/>
      <circle cx="338" cy="150" r="372" opacity="0.3"/>
      <circle cx="338" cy="150" r="436" opacity="0.22"/>
    </g>
    <!-- a couple of warm trails, like the photo -->
    <g fill="none" stroke="#e8c98a" stroke-width="1.3" opacity="0.5">
      <circle cx="338" cy="150" r="150"/>
      <circle cx="338" cy="150" r="238"/>
    </g>
    <!-- Polaris -->
    <circle cx="338" cy="150" r="3.4" fill="#f6f9ff"/>
    <!-- the measured treeline: a silhouetted conifer horizon -->
    <path fill="#0a0a18" d="M0 512 L0 468 L24 468 L46 402 L70 468 L104 468 L136 418 L170 468
      L196 468 L228 372 L262 468 L296 468 L326 410 L358 468 L392 468 L430 366 L468 468
      L512 468 L512 512 Z"/>
  </g>
</svg>
