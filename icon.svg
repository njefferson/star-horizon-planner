<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Vector rendition of the v2.0.2 brand art (art/icon-master.png): a glowing
       gold star centred over a conifer treeline. Serves as favicon + manifest
       SVG icon; the shipped PNGs are derived from the raster master instead
       (scripts/gen-assets.mjs). maskable-safe: meaning stays central. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1e34"/>
      <stop offset="0.55" stop-color="#232a4a"/>
      <stop offset="1" stop-color="#3a3a5c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd88a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffd88a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- scattered faint stars -->
  <g fill="#e9ecff">
    <circle cx="70" cy="90" r="2.5"/>
    <circle cx="180" cy="60" r="2"/>
    <circle cx="340" cy="74" r="2"/>
    <circle cx="440" cy="120" r="2.5"/>
    <circle cx="90" cy="210" r="2"/>
    <circle cx="430" cy="230" r="2.5"/>
    <circle cx="150" cy="300" r="1.8"/>
    <circle cx="390" cy="300" r="1.8"/>
  </g>
  <!-- the target star, glowing at centre sky -->
  <circle cx="256" cy="204" r="95" fill="url(#glow)"/>
  <path fill="#ffcf6b" d="M256 146 L271.3 183 L311.2 186.1 L280.7 212 L290.1 250.9 L256 230 L221.9 250.9 L231.3 212 L200.8 186.1 L240.7 183 Z"/>
  <!-- the measured horizon: an uneven CONIFER treeline (the whole point) —
       taller at the edges, dipping at centre, spiky stepped pine crowns -->
