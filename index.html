<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ebe1cf" />
  <!-- Apply the stored theme before first paint so Night Mode never flashes. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('horizon.theme');
        if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', document.documentElement.dataset.theme === 'dark' ? '#12131c' : '#ebe1cf');
      } catch (e) {}
    })();
  </script>
  <title>Horizon Planner — plan your night around YOUR sky</title>
  <meta name="description" content="An offline-first astronomy planner that answers every visibility question against a custom, per-site, physically-measured horizon — not a flat 0° minimum. Instrument-agnostic from day one." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Horizon" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <main id="app" class="view">
    <p class="empty">Loading…</p>
    <noscript>Horizon Planner is an offline app that runs in your browser — please enable JavaScript to use it. No accounts, no tracking; everything stays on your device.</noscript>
  </main>
  <nav id="tabs" class="tabs" aria-label="Primary"></nav>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
